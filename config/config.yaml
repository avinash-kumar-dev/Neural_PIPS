symbol: "EURUSD"
pip_value: 0.0001

labeling:
  tp_atr_multiplier: 4.5
  sl_atr_multiplier: 1.5
  atr_period: 14
  min_tp_pips: 9
  min_sl_pips: 3
  horizon: 20

models:
  xgboost:
    n_estimators: 300
    max_depth: 3
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
    min_child_weight: 5
    reg_alpha: 1.0
    reg_lambda: 1.0
    gamma: 0.1
    eval_metric: "logloss"
    early_stopping_rounds: 20
  lightgbm:
    n_estimators: 150
    max_depth: 4
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
    min_child_weight: 5
    reg_alpha: 1.0
    reg_lambda: 1.0
  catboost:
    iterations: 200
    depth: 4
    learning_rate: 0.05
    l2_leaf_reg: 3.0

threshold:
  min_confidence: 78

session:
  start_utc: 13
  end_utc: 16

volatility:
  min_atr_ratio: 0.5
  max_atr_ratio: 2.5
  atr_period: 14

spread:
  max_pips: 0.5

news:
  block_minutes: 15
  impacts:
    - "High"
  currencies:
    - "USD"
    - "EUR"

risk:
  risk_per_trade_pct: 0.5
  max_daily_loss_pct: 3.0

validation:
  n_windows: 30
  train_months: 6
  test_months: 1
  purge_bars: 20
  embargo_bars: 20

mt5:
  symbol: "EURUSD"
  host: "localhost"
  port: 8001
  max_candles_per_request: 5000
